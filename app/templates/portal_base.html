<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="portal-wrap">
    <div class="card portal-card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-3">
                <div class="portal-logo"><i class="bi bi-wifi"></i></div>
                <h5 class="mt-2">{{ app_name }}</h5>
            </div>

            {% for f in flashes %}
            <div class="alert alert-{{ f.category }} py-2">{{ f.message }}</div>
            {% endfor %}

            {% block content %}{% endblock %}
        </div>
    </div>
    <p class="text-center text-muted small mt-3">Wi-Fi Access Portal</p>
</div>
</body>
</html>
