<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход · {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <script>(function(){try{var t=localStorage.getItem('theme')||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');document.documentElement.setAttribute('data-bs-theme',t);}catch(e){document.documentElement.setAttribute('data-bs-theme','light');}})();</script>
</head>
<body>
<div class="bg-parallax"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>
<div class="container" style="max-width: 410px; margin-top: 12vh;">
    <div class="card">
        <div class="card-body p-4">
            <div class="d-flex justify-content-end">
                <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Светлая / тёмная тема"><i class="bi bi-moon-stars-fill"></i></button>
            </div>
            <div class="text-center mb-3">
                <div class="portal-logo"><i class="bi bi-wifi"></i></div>
                <h5 class="mt-2 gradient-text">{{ app_name }}</h5>
            </div>
            {% for f in flashes %}
            <div class="alert alert-{{ f.category }} py-2">{{ f.message }}</div>
            {% endfor %}
            <form method="post" action="/admin/login">
                <div class="mb-3">
                    <label class="form-label">Логин</label>
                    <input type="text" name="username" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
    <p class="text-center text-muted mt-3 small">Панель администратора</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
