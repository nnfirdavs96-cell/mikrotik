{% extends "base.html" %}
{% block title %}Клиент #{{ client.id }}{% endblock %}
{% block heading %}Редактирование клиента #{{ client.id }}{% endblock %}
{% block content %}
<div class="card"><div class="card-body">
<form method="post" action="/admin/clients/{{ client.id }}/edit" class="row g-3" style="max-width: 700px;">
    <div class="col-md-6">
        <label class="form-label">Телефон</label>
        <input type="text" name="phone" value="{{ client.phone }}" class="form-control" required>
    </div>
    <div class="col-md-6">
        <label class="form-label">Статус</label>
        <select name="status" class="form-select">
            {% for code, label in status_labels.items() %}
            <option value="{{ code }}" {% if client.status==code %}selected{% endif %}>{{ code }} — {{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label">Тариф</label>
        <select name="tariff_id" class="form-select">
            <option value="">— нет —</option>
            {% for t in tariffs %}
            <option value="{{ t.id }}" {% if client.tariff_id==t.id %}selected{% endif %}>{{ t.name }} ({{ t.price }} {{ t.currency }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label">MikroTik</label>
        <select name="mikrotik_id" class="form-select">
            <option value="">— нет —</option>
            {% for d in devices %}
            <option value="{{ d.id }}" {% if client.mikrotik_id==d.id %}selected{% endif %}>{{ d.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label">Истекает (expires_at)</label>
        <input type="datetime-local" name="expires_at" class="form-control"
               value="{{ client.expires_at.strftime('%Y-%m-%dT%H:%M') if client.expires_at else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">MAC / IP (только чтение)</label>
        <input type="text" class="form-control" value="{{ client.mac_address or '—' }} / {{ client.ip_address or '—' }}" disabled>
        <div class="form-text">MAC и IP берутся из DHCP lease MikroTik.</div>
    </div>
    <div class="col-12">
        <label class="form-label">Комментарий</label>
        <textarea name="comment" class="form-control" rows="2">{{ client.comment or '' }}</textarea>
    </div>
    <div class="col-12">
        <button class="btn btn-primary">Сохранить</button>
        <a href="/admin/clients" class="btn btn-outline-secondary">Назад</a>
    </div>
</form>
</div></div>
{% endblock %}
