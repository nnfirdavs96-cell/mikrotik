{% extends "portal_base.html" %}
{% block title %}Ваш номер телефона{% endblock %}
{% block content %}
<p class="text-center text-muted">Введите номер телефона — мы отправим SMS-код.</p>
<form method="post" action="/portal/send-otp">
    <div class="mb-3">
        <label class="form-label">Номер телефона</label>
        <input type="tel" name="phone" class="form-control form-control-lg" placeholder="+992 90 000 00 00" autofocus required>
    </div>
    <div class="d-grid">
        <button class="btn btn-primary btn-lg">Получить код</button>
    </div>
</form>
<p class="text-muted small mt-3 mb-0 text-center">IP и MAC вашего устройства определяются автоматически.</p>
{% endblock %}
